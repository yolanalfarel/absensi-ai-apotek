<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ABSENSI APOTEK</title>

<script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:
radial-gradient(circle at top left,#ff008c55,transparent 30%),
radial-gradient(circle at bottom right,#0066ff55,transparent 35%),
linear-gradient(135deg,#eef2ff,#fdfdff);

padding:20px;

overflow:hidden;

}

/* GLOW */

body::before{

content:"";

position:absolute;

width:500px;
height:500px;

background:#ff00aa22;

border-radius:50%;

filter:blur(120px);

top:-150px;
left:-150px;

}

body::after{

content:"";

position:absolute;

width:500px;
height:500px;

background:#0044ff22;

border-radius:50%;

filter:blur(120px);

bottom:-150px;
right:-150px;

}

/* CARD */

.card{

width:100%;
max-width:420px;

padding:28px;

border-radius:35px;

background:rgba(255,255,255,0.25);

backdrop-filter:blur(25px);

border:1px solid rgba(255,255,255,0.5);

box-shadow:
0 10px 40px rgba(0,0,0,0.1),
0 0 25px #ff00aa33,
0 0 25px #0055ff33;

position:relative;
z-index:5;

}

/* LOGO */

.logo{

width:90px;

display:block;

margin:0 auto 15px;

mix-blend-mode:multiply;

filter:
drop-shadow(0 0 15px #ff00aa66);

}

/* TITLE */

h1{

text-align:center;

font-size:34px;

line-height:1.2;

font-weight:700;

margin-bottom:10px;

background:linear-gradient(
90deg,
#0055ff,
#ff008c
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

/* CLOCK */

#clock{

text-align:center;

font-size:18px;

font-weight:600;

color:#444;

margin-bottom:20px;

}

/* VIDEO */

.video-wrapper{
#faceCanvas{

position:absolute;

top:0;
left:0;

width:100%;
height:100%;

z-index:9;

pointer-events:none;

}
position:relative;

border-radius:28px;

overflow:hidden;

border:3px solid rgba(255,255,255,0.4);

box-shadow:
0 0 20px #0055ff55,
0 0 20px #ff00aa55;

transition:0.4s;

}

/* VIDEO */

video{

width:100%;
height:330px;

object-fit:cover;

background:black;

display:block;

transform:scaleX(-1);

}

/* SCAN LINE */

.scan{

position:absolute;

width:100%;
height:4px;

background:linear-gradient(
90deg,
transparent,
#ff00aa,
#00ffee,
#0055ff,
transparent
);

box-shadow:
0 0 20px #00ffee,
0 0 40px #ff00aa;

animation:scanMove 2s linear infinite;

z-index:8;

}

@keyframes scanMove{

0%{
top:0%;
}

100%{
top:100%;
}

}

/* GRID */

.face-grid{

position:absolute;

inset:0;

background:

linear-gradient(
rgba(255,255,255,0.08) 1px,
transparent 1px
),

linear-gradient(
90deg,
rgba(255,255,255,0.08) 1px,
transparent 1px
);

background-size:35px 35px;

animation:gridPulse 2s infinite;

pointer-events:none;

z-index:2;

}

@keyframes gridPulse{

0%{
opacity:0.2;
}

50%{
opacity:1;
}

100%{
opacity:0.2;
}

}

/* FACE AI */

.face-scan{

position:absolute;

inset:0;

pointer-events:none;

z-index:10;

}

/* DOT */

.face-dot{

position:absolute;

width:10px;
height:10px;

border-radius:50%;

background:#00ffee;

box-shadow:
0 0 15px #00ffee,
0 0 25px #00ffee;

animation:pulseDot 1.5s infinite;

}

/* DOT POSITION */

.dot1{top:28%;left:50%;}
.dot2{top:38%;left:38%;}
.dot3{top:38%;left:62%;}
.dot4{top:50%;left:50%;}
.dot5{top:60%;left:42%;}
.dot6{top:60%;left:58%;}
.dot7{top:72%;left:50%;}
.dot8{top:48%;left:32%;}
.dot9{top:48%;left:68%;}

@keyframes pulseDot{

0%{
transform:scale(0.8);
opacity:0.5;
}

50%{
transform:scale(1.5);
opacity:1;
}

100%{
transform:scale(0.8);
opacity:0.5;
}

}

/* STATUS */

#status{

margin-top:22px;

text-align:center;

font-size:22px;

font-weight:600;

color:#111;

line-height:1.5;

}

/* BUTTON */

#btnBatal{

margin-top:22px;

width:220px;

display:block;

margin-left:auto;
margin-right:auto;

padding:14px 20px;

border:none;

border-radius:18px;

background:linear-gradient(
135deg,
#ff0066,
#7b2ff7
);

color:white;

font-size:16px;

font-weight:bold;

cursor:pointer;

box-shadow:
0 0 20px rgba(255,0,102,0.4);

}

#btnBatal:active{

transform:scale(0.95);

}

/* MOBILE */

@media(max-width:500px){

.card{
padding:24px;
}

h1{
font-size:28px;
}

video{
height:300px;
}

}

</style>

</head>

<body>

<div class="card">

<img src="logo.png" class="logo">

<h1>
ABSENSI HARIAN<br>
APOTEK NADHIRA FARMA
</h1>

<div id="clock"></div>

<div class="video-wrapper">

<video
id="video"
autoplay
muted
playsinline>
</video>
<canvas id="faceCanvas"></canvas>
<div class="scan"></div>

<div class="face-grid"></div>

<div class="face-scan">

<div class="face-dot dot1"></div>
<div class="face-dot dot2"></div>
<div class="face-dot dot3"></div>
<div class="face-dot dot4"></div>
<div class="face-dot dot5"></div>
<div class="face-dot dot6"></div>
<div class="face-dot dot7"></div>
<div class="face-dot dot8"></div>
<div class="face-dot dot9"></div>

</div>

</div>

<canvas
id="canvas"
style="display:none;">
</canvas>

<div id="status">
⏳ Loading AI...
</div>

<button id="btnBatal">
❌ BATAL ABSEN
</button>

</div>
window.addEventListener("hashchange", ()=>{

if(location.hash === "#terimakasih"){

document
.getElementById("terimakasih")
.style.display = "flex";

}

});
<script>

const video =
document.getElementById("video");

const canvas =
document.getElementById("canvas");

const statusText =
document.getElementById("status");

const clock =
document.getElementById("clock");
const faceCanvas =
document.getElementById("faceCanvas");

const faceCtx =
faceCanvas.getContext("2d");
let faceMatcher;

let sudahAbsen = false;

let sedangDeteksi = false;

/* CLOCK */

setInterval(()=>{

const now = new Date();

clock.innerHTML =
now.toLocaleTimeString('id-ID')
+ " WIB";

},1000);

/* START */

async function start(){

try{

statusText.innerHTML =
"🧠 Loading AI Model...";

await faceapi.nets.tinyFaceDetector.loadFromUri('./weights');

await faceapi.nets.faceLandmark68Net.loadFromUri('./weights');

await faceapi.nets.faceRecognitionNet.loadFromUri('./weights');

const stream =
await navigator.mediaDevices.getUserMedia({
video:true
});

video.srcObject = stream;

statusText.innerHTML =
"📸 Posisikan Wajah Dalam Bingkai";

}catch(err){

console.log(err);

statusText.innerHTML =
"❌ " + err.message;

}

}

/* FACE */

async function loadLabeledImages(){

const labels = [

"Al_Hafiz",
"Meisyi_Amalia",
"Putri_Sinta",
"Delpi_Vira",
"Yolan_Alfarel"

];

return Promise.all(

labels.map(async label => {

const img =
await faceapi.fetchImage(
`./database_wajah/${label}.jpg`
);

const detections =
await faceapi
.detectSingleFace(
img,
new faceapi.TinyFaceDetectorOptions()
)
.withFaceLandmarks()
.withFaceDescriptor();

if(!detections){

return null;

}

return new faceapi.LabeledFaceDescriptors(
label,
[detections.descriptor]
);

})

);

}

/* AI */

async function startRecognition(){

const labeledDescriptors =
(await loadLabeledImages())
.filter(x => x !== null);

faceMatcher =
new faceapi.FaceMatcher(
labeledDescriptors,
0.55
);

setInterval(async ()=>{

const detections =
await faceapi
.detectAllFaces(
video,
new faceapi.TinyFaceDetectorOptions()
)
.withFaceLandmarks()
.withFaceDescriptors();

if(detections.length > 0){
/* FACE AI */

faceCanvas.width =
video.videoWidth;

faceCanvas.height =
video.videoHeight;

faceCtx.clearRect(
0,
0,
faceCanvas.width,
faceCanvas.height
);

const landmarks =
detections[0].landmarks.positions;

/* PARTICLE */

faceCtx.fillStyle =
"#00ffee";

/* GARIS */

faceCtx.strokeStyle =
"#00ffee";

faceCtx.lineWidth = 1.2;

/* FACE MESH */

for(let i=0;i<landmarks.length;i++){

const point =
landmarks[i];

/* DOT */

faceCtx.beginPath();

faceCtx.arc(
point.x,
point.y,
2.2,
0,
Math.PI*2
);

faceCtx.fill();

/* LINE */

if(i < landmarks.length - 1){

faceCtx.beginPath();

faceCtx.moveTo(
point.x,
point.y
);

faceCtx.lineTo(
landmarks[i+1].x,
landmarks[i+1].y
);

faceCtx.stroke();

}

}

/* RADAR */

const radarY =
(Date.now()/7)
%
faceCanvas.height;

faceCtx.beginPath();

faceCtx.moveTo(0,radarY);

faceCtx.lineTo(
faceCanvas.width,
radarY
);

faceCtx.strokeStyle =
"#00ff99";

faceCtx.shadowColor =
"#00ff99";

faceCtx.shadowBlur = 20;

faceCtx.lineWidth = 2;

faceCtx.stroke();

/* RETINA */

const eye =
landmarks[27];

faceCtx.beginPath();

faceCtx.arc(
eye.x,
eye.y,
28,
0,
Math.PI*2
);

faceCtx.strokeStyle =
"#00d9ff";

faceCtx.lineWidth = 2;

faceCtx.stroke();
const bestMatch =
faceMatcher.findBestMatch(
detections[0].descriptor
);

if(bestMatch.label !== "unknown"){

document
.querySelector(".video-wrapper")
.style.boxShadow = `
0 0 35px #ff00aa,
0 0 60px #0055ff
`;

}else{

document
.querySelector(".video-wrapper")
.style.boxShadow = `
0 0 20px #0055ff55,
0 0 20px #ff00aa55
`;

}

statusText.innerHTML =
"👤 " + bestMatch.toString();

if(
bestMatch.label !== "unknown"
&&
!sudahAbsen
&&
!sedangDeteksi
){

sedangDeteksi = true;

statusText.innerHTML = `
✅ BERHASIL MENDETEKSI WAJAH<br><br>
👤 ${bestMatch.label.replaceAll("_"," ")}
`;

setTimeout(()=>{

cekAbsensi(bestMatch.label);

},800);

}

}

},1000);

}

/* ABSENSI */
async function cekAbsensi(nama){

statusText.innerHTML =
"🔍 Mengecek absensi hari ini...";

const response =
await fetch(
"https://script.google.com/macros/s/AKfycbx7fkoLgH6igHP17przjmxWaP8bQNG_6OcoQ3-Ug79A_vmZxK6_ibCdLC0u-W-JLtw3/exec?nama="
+ nama
);

const hasil =
await response.json();

/* SUDAH ABSEN */

if(hasil.sudahAbsen){

if(video.srcObject){

video.srcObject
.getTracks()
.forEach(track => track.stop());

}

document.body.innerHTML = `

<div style="
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(
135deg,
#fff0f7,
#edf4ff
);
font-family:Poppins;
padding:20px;
">

<div style="
background:white;
padding:40px;
border-radius:35px;
text-align:center;
max-width:400px;
width:100%;
box-shadow:
0 0 30px #ff006655;
">

<div style="
font-size:90px;
margin-bottom:10px;
">
⚠️
</div>

<h1 style="
color:#ff0066;
margin-bottom:20px;
">
ABSEN SUDAH ADA
</h1>

<p style="
font-size:28px;
font-weight:bold;
margin-bottom:15px;
">
${nama.replaceAll("_"," ")}
</p>

<p style="
color:#555;
font-size:18px;
line-height:1.7;
">
Kamu sudah melakukan absensi hari ini
</p>

</div>

</div>

`;

return;

}

/* LANJUT ABSEN */

kirimAbsensi(nama);

}
async function kirimAbsensi(nama){

if(sudahAbsen) return;

sudahAbsen = true;

const audio =
new Audio(
"https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"
);

audio.play();

canvas.width =
video.videoWidth;

canvas.height =
video.videoHeight;

const ctx =
canvas.getContext("2d");

ctx.drawImage(
video,
0,
0,
canvas.width,
canvas.height
);

const foto =
canvas.toDataURL("image/png");

statusText.innerHTML =
"📤 Mengirim absensi...";

try{

const response =
await fetch(
"https://script.google.com/macros/s/AKfycbx7fkoLgH6igHP17przjmxWaP8bQNG_6OcoQ3-Ug79A_vmZxK6_ibCdLC0u-W-JLtw3/exec",
{
method:"POST",
body:JSON.stringify({

nama:nama,
foto:foto

})
}
);

const hasil =
await response.json();

console.log(hasil);

/* STOP CAMERA */

if(video.srcObject){

video.srcObject
.getTracks()
.forEach(track => track.stop());

}

/* SUCCESS */

document.body.innerHTML = `

<div style="
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:
linear-gradient(
135deg,
#fff0f7,
#edf4ff
);
font-family:Poppins;
padding:20px;
">

<div style="
background:rgba(255,255,255,0.7);
backdrop-filter:blur(20px);
padding:40px;
border-radius:35px;
text-align:center;
max-width:400px;
width:100%;
box-shadow:
0 10px 40px rgba(0,0,0,0.1),
0 0 25px #ff00aa33,
0 0 25px #0055ff33;
">

<div style="
font-size:95px;
margin-bottom:10px;
">
✅
</div>

<h1 style="
font-size:38px;
font-weight:700;
margin-bottom:15px;
background:linear-gradient(
90deg,
#0055ff,
#ff008c
);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
">
ABSEN BERHASIL
</h1>

<p style="
font-size:28px;
font-weight:bold;
margin-bottom:15px;
color:#111;
">
${nama.replaceAll("_"," ")}
</p>

<p style="
font-size:18px;
color:#666;
line-height:1.7;
margin-bottom:25px;
">
Kamu sudah absen hari ini
</p>

<p style="
font-size:22px;
font-weight:bold;
color:#00aa55;
margin-bottom:35px;
">
🎉 Selamat bekerja
</p>

<a
href="#terimakasih"
style="
margin-top:35px;

width:100%;
max-width:360px;

height:72px;

display:flex;
justify-content:center;
align-items:center;

margin-left:auto;
margin-right:auto;

border-radius:24px;

background:
linear-gradient(
90deg,
#2140ff,
#ff00a8
);

color:white;

font-size:18px;
font-weight:700;

white-space:nowrap;

box-shadow:
0 12px 35px rgba(255,0,170,0.35);

text-decoration:none;

-webkit-tap-highlight-color:transparent;

touch-action:manipulation;

user-select:none;
"

>

❌ KELUAR APLIKASI

</a>

</div>

</div>

`;

}catch(err){

console.log(err);

statusText.innerHTML =
"❌ GAGAL MENGIRIM";

sudahAbsen = false;

sedangDeteksi = false;

}

}

/* CANCEL */

document
.getElementById("btnBatal")
.onclick = ()=>{

if(video.srcObject){

video.srcObject
.getTracks()
.forEach(track => track.stop());

}

document.body.innerHTML = `

<div style="
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#eef2f7;
font-family:Poppins;
">

<div style="
background:white;
padding:40px;
border-radius:35px;
text-align:center;
box-shadow:
0 10px 30px rgba(0,0,0,0.1);
">

<div style="
font-size:90px;
">
❌
</div>

<h1 style="
color:#ff0066;
margin-bottom:15px;
">
ABSENSI DIBATALKAN
</h1>

<p style="
font-size:18px;
color:#555;
">
Kamera telah dimatikan
</p>

</div>

</div>

`;

};

/* LOAD */

window.onload = async ()=>{

await start();

await startRecognition();

};

  document.body.innerHTML = `

</script>
