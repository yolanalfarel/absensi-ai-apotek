<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ABSENSI AI APOTEK</title>

<script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

<style>

body{
  margin:0;
  padding:0;
  background:#eef2f7;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  width:420px;
  background:white;
  border-radius:25px;
  padding:25px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
  color:#1e3a8a;
}

video{
  width:100%;
  border-radius:20px;
  background:black;
}

#status{
  margin-top:20px;
  font-size:20px;
  font-weight:bold;
}

</style>

</head>

<body>

<div class="card">

<h1>ABSENSI AI APOTEK</h1>

<video id="video" autoplay muted playsinline></video>

<div id="status">
⏳ Loading AI...
</div>

</div>

<script>

const video = document.getElementById("video");
const statusText = document.getElementById("status");

async function start(){

  try{

    statusText.innerHTML =
    "🧠 Loading AI Model...";

    await faceapi.nets.tinyFaceDetector.loadFromUri('./weights');

    await faceapi.nets.faceLandmark68Net.loadFromUri('./weights');

    await faceapi.nets.faceRecognitionNet.loadFromUri('./weights');

    statusText.innerHTML =
    "📸 Membuka kamera...";

    const stream =
    await navigator.mediaDevices.getUserMedia({
      video:true
    });

    video.srcObject = stream;

    statusText.innerHTML =
    "✅ AI Aktif & Kamera Menyala";

  }

  catch(err){

    console.log(err);

    statusText.innerHTML =
    "❌ ERROR: " + err.message;

  }

}

let faceMatcher;

async function loadLabeledImages(){

  const labels = [

  "Al_Hafiz",
  "Meisyi_Amalia",
  "Putri_Sinta",
  "Delpi_Vira",
  "Yolan_Alfarel"

];

  return Promise.all(

    labels.map(async label => {

      const img = await faceapi.fetchImage(
        `./database_wajah/${label}.jpg`
      );

      const detections =
await faceapi
.detectSingleFace(
  img,
  new faceapi.TinyFaceDetectorOptions()
)
.withFaceLandmarks()
.withFaceDescriptor();

console.log(label);
console.log(detections);

      if(!detections){

  console.log("GAGAL DETEKSI:", label);

  return null;

}

return new faceapi.LabeledFaceDescriptors(
  label,
  [detections.descriptor]
);

    })

  );

}

async function startRecognition(){

  const labeledDescriptors =
(await loadLabeledImages())
.filter(x => x !== null);

  faceMatcher =
  new faceapi.FaceMatcher(
    labeledDescriptors,
    0.55
  );

  setInterval(async ()=>{

    const detections =
    await faceapi
    .detectAllFaces(
      video,
      new faceapi.TinyFaceDetectorOptions()
    )
    .withFaceLandmarks()
    .withFaceDescriptors();

    if(detections.length > 0){

      const bestMatch =
      faceMatcher.findBestMatch(
        detections[0].descriptor
      );

      console.log(bestMatch);

      statusText.innerHTML =
      "👤 " + bestMatch.toString();

    }

  },1000);

}

window.onload = async ()=>{

  await start();

  await startRecognition();

};

</script>

</body>
</html>
