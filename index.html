<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ABSENSI AI APOTEK</title>

<script defer src="https://unpkg.com/face-api.js"></script>

<style>

body{

  margin:0;
  padding:0;

  background:#eef2f7;

  font-family:Arial,sans-serif;

  display:flex;

  justify-content:center;

  align-items:center;

  height:100vh;

}

.card{

  width:420px;

  background:white;

  border-radius:25px;

  padding:25px;

  text-align:center;

  box-shadow:0 10px 30px rgba(0,0,0,0.1);

}

h1{

  color:#1e3a8a;

  margin-bottom:20px;

}

video{

  width:100%;

  border-radius:20px;

  background:black;

}

#status{

  margin-top:20px;

  font-size:18px;

  font-weight:bold;

  color:#444;

}

</style>

</head>

<body>

<div class="card">

<h1>
ABSENSI AI APOTEK
</h1>

<video
  id="video"
  autoplay
  muted
  playsinline>
</video>

<div id="status">

⏳ Loading AI...

</div>

</div>

<script>

const video =
document.getElementById("video");

const statusText =
document.getElementById("status");

async function loadModels(){

  statusText.innerHTML =
  "🧠 Loading AI model...";

  await faceapi.nets.tinyFaceDetector
  .loadFromUri('./models');

  await faceapi.nets.faceLandmark68Net
  .loadFromUri('./models');

  await faceapi.nets.faceRecognitionNet
  .loadFromUri('./models');

  statusText.innerHTML =
  "✅ AI berhasil dimuat";

  startCamera();

}

async function startCamera(){

  try{

    const stream =
    await navigator.mediaDevices.getUserMedia({

      video:true,
      audio:false

    });

    video.srcObject = stream;

    statusText.innerHTML =
    "📸 Kamera aktif";

  }

  catch(error){

    console.log(error);

    statusText.innerHTML =
    "❌ Kamera gagal dibuka";

  }

}

loadModels();

</script>

</body>
</html>
